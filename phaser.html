<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pipe Panic - Prototipo Phaser</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <canvas id="game" width="960" height="540" aria-label="Prototipo Phaser Pipe Panic"></canvas>
    <div class="hud-note">Prototipo Phaser: versión en migración. Juego completo en <a href="index.html">index.html</a>.</div>

    <section id="characterScreen" class="screen" aria-labelledby="title">
      <div class="select-panel">
        <h1 id="title">Pipe Panic Phaser</h1>
        <p class="subtitle">Prototipo técnico para migrar el juego a Phaser sin sustituir todavía la versión completa.</p>
        <div class="cards" id="characterCards"></div>
        <button class="back-button" id="viewRanking" type="button" style="margin-top:20px">Ver Ranking</button>
      </div>
    </section>

    <section id="rankingScreen" class="screen hidden" aria-labelledby="rankingTitle">
      <div class="select-panel">
        <h1 id="rankingTitle" style="margin-bottom:20px">Ranking</h1>
        <div id="rankingList"></div>
        <button class="back-button" id="backToCharactersFromRanking" type="button">Volver</button>
      </div>
    </section>

    <section id="scenarioScreen" class="screen hidden" aria-labelledby="scenarioTitle">
      <div class="select-panel">
        <h1 id="scenarioTitle">Elige Lugar</h1>
        <p class="subtitle" id="scenarioSubtitle">Cada escenario está inspirado en un lugar real y cambia el ritmo de la avería.</p>
        <div class="cards" id="scenarioCards"></div>
        <button class="back-button" id="backToCharacters" type="button">Volver a personajes</button>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="characters.js"></script>
  <script src="scenarios.js"></script>
  <script src="phaser-game.js"></script>
</body>
</html>
